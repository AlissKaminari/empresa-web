<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - EVE COFFEE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <h1 class="eve">EVE COFFEE</h1>
    <nav class="navbar">
        <a href="index.html" class="navLink">Inicio</a>
        <a href="servicios.html" class="navLink">Servicios</a>
        <a href="control.html" class="navLink" style="text-decoration: underline;">Control</a>
        <a href="nosotros.html" class="navLink">Nosotros</a>
    </nav>
</header>

<section>
    
    <div style="text-align: center;">
        
        <h2 class="eve" style="font-size: 35px; margin-bottom: 20px;">Haz tu pedido</h2>
        
        <form action="#" method="POST">
            
            <label style="font-size: 18px; text-align: left;">Nombre:</label>
            <input type="text" name="nombre" placeholder="Tu nombre" required>

            <label style="font-size: 18px; text-align: left;">Producto:</label>
            <select name="producto" required style="margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="" disabled selected>Elige un producto</option>
                <option value="americano">Café Americano</option>
                <option value="latte">Latte</option>
                <option value="croissant">Croissant</option>
            </select>

            <label style="font-size: 18px; text-align: left;">Cantidad:</label>
            <input type="number" name="cantidad" min="1" required>

            <button type="submit">Enviar Pedido</button>
            
        </form>
    </div>

</section>

<footer>
    <p>© 2026 Café Aroma</p>
</footer>

</body>
</html>
