<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - Café Aroma</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header-principal">
    <h1 class="titulo-pagina">Realizar Pedido <span class="icono-titulo">🧾</span></h1>
    <nav class="navegacion-principal">
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Menú</a>
        <a href="control.html" class="activo">Pedidos</a>
        <a href="nosotros.html">Nosotros</a>
    </nav>
</header>

<main class="contenedor-principal">
    
    <section class="seccion-pedido">
        
        <div class="columna-texto">
            <h2 class="titulo-seccion">Haz tu pedido</h2>
        </div>

        <form action="#" method="POST" class="formulario-pedido">
            
            <div class="grupo-formulario">
                <label for="nombre-cliente" class="etiqueta-formulario">Nombre:</label>
                <input type="text" id="nombre-cliente" name="nombre" class="campo-formulario" placeholder="Tu nombre" required>
            </div>

            <div class="grupo-formulario">
                <label for="producto-pedido" class="etiqueta-formulario">Producto:</label>
                <input type="text" id="producto-pedido" name="producto" class="campo-formulario" placeholder="Ej. Latte" required>
            </div>

            <div class="grupo-formulario">
                <label for="cantidad-pedido" class="etiqueta-formulario">Cantidad:</label>
                <input type="number" id="cantidad-pedido" name="cantidad" class="campo-formulario" min="1" required>
            </div>

            <button type="submit" class="boton-enviar">Enviar Pedido</button>
            
        </form>
    </section>

</main>

<footer class="footer-principal">
    <p>© 2026 Café Aroma</p>
</footer>

</body>
</html>
